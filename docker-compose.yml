services:
  validadocs-db:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: validadocs-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: validadocs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d validadocs"]
      interval: 5s
      timeout: 5s
      retries: 5


  validadocs-redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: validadocs-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5


  validadocs-minio:
    image: quay.io/minio/minio
    container_name: validadocs-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    expose:
      - "9000"
      - "9001"

    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5


  validadocs-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: validadocs-app
    container_name: validadocs-app
    restart: always
    expose:
      - "3000"

    environment:
      RUNNING_IN_DOCKER: "true"
      DATABASE_URL: "postgresql://postgres:postgrespassword@validadocs-db:5432/validadocs?schema=public"
      REDIS_URL: "redis://validadocs-redis:6379"
      MINIO_ENDPOINT: "validadocs-minio"
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: "admin"
      MINIO_SECRET_KEY: "admin123"
      MINIO_BUCKET: "validadocs"
      MINIO_USE_SSL: "false"
      PORT: 3000
      HOST: "0.0.0.0"
    depends_on:
      validadocs-db:
        condition: service_healthy
      validadocs-redis:
        condition: service_healthy
      validadocs-minio:
        condition: service_healthy

volumes:
  postgres_data:
    name: validadocs_postgres_data
  redis_data:
    name: validadocs_redis_data
  minio_data:
    name: validadocs_minio_data
